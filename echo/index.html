<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F7F5F2">
  <title>回声 Echo Me</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="fonts/iconfont.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app" class="app">
    <div class="status-bar"></div>

    <main class="pages" id="pages">
      <!-- 首页 -->
      <section class="page page-home active" data-page="home">
        <header class="home-header">
          <div class="logo">回声</div>
          <div class="header-actions">
            <button class="icon-btn" aria-label="编辑卡片" onclick="app.toggleEditMode()"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="icon-btn" aria-label="添加卡片" onclick="app.openAddCard()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
        </header>

        <div class="greeting-card card">
          <div class="greeting-left">
            <p class="greeting-time" id="greetingTime">下午好，</p>
            <h1 class="greeting-name" id="greetingName">用户09174</h1>
          </div>
          <div class="greeting-avatar">
            <img src="./images/human1.png" alt="个人形象" id="homeAvatar">
          </div>
        </div>

        <div class="home-grid" id="homeGrid"></div>
        <div class="home-bottom-spacer"></div>
      </section>

      <!-- AI 形象大厅 -->
      <section class="page page-ai" data-page="ai">
        <div class="ai-hero">
          <div class="ai-hero-text">
            <h2>选择一个形象<br>开始陪伴对话</h2>
            <p>长按形象可编辑或删除</p>
          </div>
          <img src="./images/human1.png" alt="个人形象" class="ai-hero-avatar">
        </div>
        <div class="ai-header">
          <h2>我的形象</h2>
          <button class="icon-btn" aria-label="添加陪伴形象" onclick="app.openAddAvatar()">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="avatar-list" id="avatarList"></div>
      </section>

      <!-- AI 独立对话页（无 tab 入口） -->
      <section class="page page-chat" data-page="chat">
        <header class="chat-header">
          <button class="icon-btn back-btn" onclick="app.switchTab('ai')"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
          <div class="chat-title">
            <img src="" alt="" id="chatHeaderAvatar">
            <div>
              <span id="chatHeaderName"></span>
              <small id="chatHeaderStatus">在线</small>
            </div>
          </div>
          <button class="icon-btn" aria-label="更多"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
        </header>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-bar">
          <input type="text" class="chat-input" id="chatInput" placeholder="询问任何问题" onkeypress="app.handleChatKey(event)">
          <button class="icon-btn voice-btn" aria-label="语音输入" onclick="app.startVoice()"><svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
          <button class="icon-btn send-btn" aria-label="发送" onclick="app.sendMessage()"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
      </section>

      <!-- 小记 -->
      <section class="page page-notes" data-page="notes">
        <header class="page-header">
          <h2>小记</h2>
          <button class="icon-btn" aria-label="新建笔记" onclick="app.openNoteEditor()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </header>
        <div class="notes-tabs">
          <button class="notes-tab active" data-tab="all">全部</button>
          <button class="notes-tab" data-tab="ai">AI 日记</button>
          <button class="notes-tab" data-tab="media">多媒体</button>
        </div>
        <div class="notes-list" id="notesList"></div>
      </section>

      <!-- 我的 -->
      <section class="page page-profile" data-page="profile">
        <div class="profile-hero">
          <div class="profile-bg"></div>
          <div class="profile-card card">
            <div class="profile-body">
              <div class="profile-left">
                <div class="profile-info">
                  <h2 id="profileName">用户09174</h2>
                  <p id="profileId">@982837</p>
                </div>
                <div class="profile-stats">
                  <div><span>小记</span><b id="noteCount">0</b></div>
                  <div><span>形象</span><b id="avatarCount">0</b></div>
                  <div><span>关注</span><b>0</b></div>
                  <div><span>获赞</span><b id="likeCount">0</b></div>
                </div>
                <div class="profile-actions">
                  <button class="btn-primary" onclick="app.openEditProfile()">编辑资料</button>
                  <button class="icon-btn settings-btn" aria-label="设置" onclick="app.openSettings()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
                </div>
              </div>
              <div class="profile-right">
                <img src="./images/human1.png" alt="头像" class="profile-avatar" id="profileAvatar">
              </div>
            </div>
          </div>
        </div>

        <div class="more-play card">
          <h3>更多玩法</h3>
          <div class="play-grid">
            <div class="play-item" style="background-image:url('./images/human3.png')">
              <span>心情手账</span>
              <small>记录每日情绪变化</small>
            </div>
            <div class="play-item" style="background-image:url('./images/pet4.png')">
              <span>AI 日记</span>
              <small>自动生成今日回顾</small>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- 底部导航（4 项） -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-item active" data-tab="home" onclick="app.switchTab('home')">
        <i class="iconfont icon-a-045_zhuye"></i>
        <span>首页</span>
      </button>
      <button class="nav-item" data-tab="ai" onclick="app.switchTab('ai')">
        <i class="iconfont icon-a-045_liaotian"></i>
        <span>AI</span>
      </button>
      <button class="nav-item" data-tab="notes" onclick="app.switchTab('notes')">
        <i class="iconfont icon-a-045_shuben"></i>
        <span>小记</span>
      </button>
      <button class="nav-item" data-tab="profile" onclick="app.switchTab('profile')">
        <i class="iconfont icon-a-045_wode-14"></i>
        <span>我的</span>
      </button>
    </nav>

    <!-- 数据详情页（无 tab 入口） -->
    <section class="page page-detail" data-page="detail" id="detailPage">
      <header class="page-header">
        <button class="icon-btn back-btn" onclick="app.switchTab('home')"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
        <h2 id="detailTitle">数据详情</h2>
        <button class="icon-btn" aria-label="添加" onclick="app.openAddDetailData()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </header>
      <div class="detail-body" id="detailBody"></div>
    </section>

    <!-- 弹窗 -->
    <div class="modal" id="modal">
      <div class="modal-mask" onclick="app.closeModal()"></div>
      <div class="modal-content card" id="modalContent"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/home.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
